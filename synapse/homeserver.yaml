# deploy/synapse/homeserver.yaml
# Configuration file for Synapse

server_name: "msldev.ru"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    user: synapse_user
    password: YourSynapsePassword123!
    database: synapse_db
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 10

log_config: "/data/msldev.ru.log.config"

media_store_path: /data/media_store
uploads_path: /data/uploads
max_upload_size: "50M"
max_image_pixels: "32M"

# Регистрация
registration_shared_secret: "X5:2XN7*Q^WxbJE7K2NiYVFU#h=VE:.:pPq33Cu7mE=nJtW.:K"
enable_registration: true
enable_registration_without_verification: true
enable_registration_captcha: false
registrations_require_3pid: []

# Секретные ключи
macaroon_secret_key: "vAjGYmKo-Pd40PrgDh-Nbo.e4civ,H&Yf:,l=1G0eyeNMZNR3x"
form_secret: "18;4j=G-~iVbNP2N#Q1;onIPi:+TnJqdm3X6MSM4Lhm0.~@xhY"

# Ключи подписи
signing_key_path: "/data/msldev.ru.signing.key"
suppress_key_server_warning: true
trusted_key_servers:
  - server_name: "matrix.org"

# Отчётность
report_stats: false

user_directory_search_all_users: true
enable_presence: false